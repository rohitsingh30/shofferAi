services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shofferai
      POSTGRES_PASSWORD: shofferai_dev
      POSTGRES_DB: shofferai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shofferai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
