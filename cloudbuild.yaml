steps:
  # Build + Push with Kaniko (automatic layer caching — caches ALL intermediate
  # layers including npm ci and prisma generate in Artifact Registry).
  # Combines build + push into one step, eliminating the separate push overhead.
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--dockerfile=Dockerfile'
      - '--context=.'
      - '--destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/shofferai:${_TAG}'
      - '--destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/shofferai:latest'
      - '--cache=true'
      - '--cache-ttl=168h'
      - '--snapshot-mode=redo'
      - '--use-new-run'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'shofferai'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/shofferai:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--timeout'
      - '300'
      - '--update-env-vars'
      - 'RELAY_MODE=cloud'

substitutions:
  _REGION: asia-south1
  _REPO: shofferai
  _TAG: latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
